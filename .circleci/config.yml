version: 2.1
jobs:
  build:

    # Specify the Xcode version to use
    macos:
      xcode: "11.6.0"

    steps:
      - checkout

    # Install CocoaPods
      - run:
          name: Install CocoaPods
          command: pod install

    # Run scheme and project
      - run:
          # run our tests using xcode's cli tool `xcodebuild`
          name: Run Unit Tests
          command: xcodebuild -sdk iphonesimulator -workspace loafwallet.xcworkspace/ -scheme "loafwallet" clean build SL_RUN_UNIT_TESTS=YES

